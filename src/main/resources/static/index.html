<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Backend • Status</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #238636;
            --accent-glow: rgba(35, 134, 54, 0.4);
            --border-color: #30363d;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .badge-pulse {
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: pulse 1.8s infinite;
        }
        .status-text {
            font-weight: 600;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            color: #f0f6fc;
        }
        p {
            color: #8b949e;
            font-size: 0.95rem;
            margin: 0 0 2rem 0;
        }
        .meta-info {
            border-top: 1px solid var(--border-color);
            padding-top: 1.2rem;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.8rem;
            color: #8b949e;
            text-align: left;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }
        .meta-label { color: #6e7681; }
        .meta-value { color: #b1bac4; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(35, 134, 54, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge-container">
        <div class="badge-pulse"></div>
        <span class="status-text">Sistema Online</span>
    </div>
    <h1>vera-backend</h1>
    <p>El ecosistema de análisis de seguridad está funcionando correctamente en Render.</p>

    <div class="meta-info">
        <div class="meta-row">
            <span class="meta-label">Entorno:</span>
            <span class="meta-value">Production</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">Spring Boot:</span>
            <span class="meta-value">v4.0.6</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">Java Version:</span>
            <span class="meta-value">JDK 25</span>
        </div>
    </div>
</div>
</body>
</html>
