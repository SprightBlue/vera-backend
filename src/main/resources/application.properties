# ============================================================
# RESILIENCE (RESILIENCE4J)
# ============================================================
# Retry
resilience4j.retry.instances.geminiConfig.maxAttempts=3
resilience4j.retry.instances.geminiConfig.waitDuration=2s
resilience4j.retry.instances.geminiConfig.enableExponentialBackoff=true

# Circuit Breaker
resilience4j.circuitbreaker.instances.geminiConfig.slidingWindowSize=10
resilience4j.circuitbreaker.instances.geminiConfig.failureRateThreshold=50
resilience4j.circuitbreaker.instances.geminiConfig.waitDurationInOpenState=10s

