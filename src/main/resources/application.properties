# --- Conexión a Neon ---
spring.datasource.url=jdbc:postgresql://ep-holy-wind-aklqwzsa-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_rN9t0LpBlUIG
spring.datasource.driver-class-name=org.postgresql.Driver

# --- SSL requerido por Neon ---
spring.datasource.hikari.data-source-properties.sslmode=require

# --- Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Pool de conexiones (ajustado para Neon) ---
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.keepalive-time=30000

# --- Servidor ---
server.port=8080

# --- JWT ---
jwt.secret=YmFzZTY0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmctZm9yLWhtYWMyNTY=
jwt.expiration=86400000

# --- Google Safe Browsing ---
google.safe-browsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY:}

# --- Google Gemini ---
google.gemini.api-key=${GOOGLE_GEMINI_API_KEY:}
google.gemini.model=gemini-2.5-flash
google.gemini.fallback-model=gemini-3.1-flash-lite

# --- Swagger/OpenAPI ---
springdoc.swagger-ui.path=/
springdoc.api-docs.path=/api-docs

# --- Logback/slf4j ---
spring.output.ansi.enabled=ALWAYS
logging.level.root=INFO
logging.level.com.unlam.verabackend=DEBUG
logging.file.name=logs/mi-back.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10